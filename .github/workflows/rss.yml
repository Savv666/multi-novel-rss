name: Build RSS and EPUB

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Build feeds
        run: python generate_all_feeds.py

      - name: Build EPUBs from feeds
        run: python build_epubs_from_feeds.py

      - name: Ensure .nojekyll exists
        run: |
          mkdir -p docs
          touch docs/.nojekyll

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs state novels.json novel-links.txt
          git commit -m "Update RSS feeds and EPUB books" || exit 0
          git push
